<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serverless Bookstore</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

/* Background animation */
body{
    min-height:100vh;
    background: linear-gradient(-45deg,#4facfe,#00f2fe,#667eea,#764ba2);
    background-size:400% 400%;
    animation: gradientBG 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Main Card */
.container{
    width:900px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* Inputs */
.input-group{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* Buttons */
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#ffffff;
    color:#333;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#000;
    color:white;
}

/* Books Grid */
#books{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

/* Book Card */
.book-card{
    background:rgba(255,255,255,0.2);
    padding:15px;
    border-radius:12px;
    transition:0.3s;
    animation:cardAppear 0.5s ease;
}

@keyframes cardAppear{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

.book-card:hover{
    transform:translateY(-5px);
    box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

.book-title{
    font-size:18px;
    font-weight:600;
}

.price{
    margin:8px 0;
    font-weight:500;
}

/* Delete button */
.delete-btn{
    background:#ff4d4d;
    color:white;
}

.delete-btn:hover{
    background:#cc0000;
}

/* Loader */
.loader{
    text-align:center;
    margin-top:10px;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>📚 Serverless Bookstore</h2>

<div class="input-group">
<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author">
<input id="price" placeholder="Price">
<button onclick="addBook()">Add</button>
</div>

<button onclick="getBooks()">Load Books</button>

<div class="loader" id="loader">Loading...</div>

<div id="books"></div>

</div>

<script>

const API_URL="https://pc6npum80k.execute-api.us-east-1.amazonaws.com/prod/books"

function showLoader(show){
    document.getElementById("loader").style.display =
        show ? "block" : "none"
}

/* ADD BOOK */
function addBook(){

const data={
title:document.getElementById("title").value,
author:document.getElementById("author").value,
price:document.getElementById("price").value
}

fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(()=>{
getBooks()
})
}

/* GET BOOKS */
function getBooks(){

showLoader(true)

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

let list=""

data.forEach(book=>{
list+=`
<div class="book-card">
<div class="book-title">${book.title}</div>
<div>${book.author}</div>
<div class="price">$${book.price}</div>
<button class="delete-btn"
onclick="deleteBook('${book.bookId}')">
Delete
</button>
</div>`
})

document.getElementById("books").innerHTML=list
showLoader(false)

})
}

/* DELETE */
function deleteBook(id){

fetch(API_URL+"?bookId="+id,{
method:"DELETE"
})
.then(()=>getBooks())

}

</script>

</body>
</html>
